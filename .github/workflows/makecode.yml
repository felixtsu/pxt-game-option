name: MakeCode

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: build extension
        run: |
          npm install -g pxt
          pxt target arcade
          pxt install
          pxt build --cloud
